<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صيدليتي المنزلية</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; }
        table { width: 80%; margin: 20px auto; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #28a745; color: white; }
        .expired { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>مخزون الصيدلية المنزلية</h1>
    <table id="pharmacyTable">
        <thead>
            <tr>
                <th>الدواء</th>
                <th>التصنيف</th>
                <th>الانتهاء</th>
                <th>الكمية</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // ضع رابط الـ Web App الخاص بك هنا
        const url = 'https://script.google.com/macros/s/AKfycbymOkCAojGRaZJq7indF9ZoPgQlPsTb0IfKD9kbp2QPb89PV6gnT0CIW7o2FREFq5JNaw/exec';

        fetch(url)
            .then(res => res.json())
            .then(data => {
                let tableBody = document.querySelector("#pharmacyTable tbody");
                data.forEach(item => {
                    let row = `<tr>
                        <td>${item.name}</td>
                        <td>${item.category}</td>
                        <td>${item.expiry}</td>
                        <td>${item.quantity}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            });
    </script>
</body>
</html>
